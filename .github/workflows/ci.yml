# EarthShare CI pipeline
# Runs on every push and pull_request targeting main.
# Jobs:
#   lint-backend   — ruff static analysis
#   test-backend   — pytest with coverage gate (80%)
#   lint-frontend  — ESLint
#   test-frontend  — Vitest component + a11y tests
#   security-scan  — pip-audit + npm audit
#
# Gemini live integration tests are gated behind GEMINI_API_KEY (repository
# secret). The test file uses @pytest.mark.skipif so the suite always passes
# even without the secret — the live test simply skips.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

# ──────────────────────────────────────────────────────────────
# Backend jobs
# ──────────────────────────────────────────────────────────────
jobs:
  lint-backend:
    name: Backend — lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check app tests

  test-backend:
    name: Backend — pytest (coverage ≥ 80%)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: sqlite:///:memory:
      JWT_SECRET_KEY: ci-test-secret-not-for-production
      ENVIRONMENT: test
      # Optional: set in repository secrets to enable live Gemini tests
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/.coverage
          retention-days: 7

# ──────────────────────────────────────────────────────────────
# Frontend jobs
# ──────────────────────────────────────────────────────────────
  lint-frontend:
    name: Frontend — lint (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test-frontend:
    name: Frontend — Vitest (unit + a11y)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

  build-frontend:
    name: Frontend — Next.js build check
    runs-on: ubuntu-latest
    needs: [lint-frontend, test-frontend]
    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

# ──────────────────────────────────────────────────────────────
# Security scan (non-blocking advisory)
# ──────────────────────────────────────────────────────────────
  security-scan:
    name: Security — dependency audit
    runs-on: ubuntu-latest
    continue-on-error: true   # advisory only; doesn't block merge

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --format markdown >> $GITHUB_STEP_SUMMARY || true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: npm audit
        working-directory: frontend
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=high >> $GITHUB_STEP_SUMMARY || true
